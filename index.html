        <img id="overlay-image-first" class="max-w-full max-h-[60vh] sm:max-h-[70vh] md:max-h-[80vh] lg:max-h-[80vh] object-contain select-none bg-white cursor-pointer" src="" alt="First image" onclick="window.open(this.src, '_blank')">
        <img id="overlay-image-second" class="max-w-full max-h-[60vh] sm:max-h-[70vh] md:max-h-[80vh] lg:max-h-[80vh] object-contain select-none bg-white cursor-pointer hidden" src="" alt="Second image" onclick="window.open(this.src, '_blank')">
      </div>
      <p id="overlay-description" class="mt-8 text-white text-base md:text-lg text-center"></p>
    </div>
</div>
  <!------------------------------------------------------------------->

  <div id="contactModal" class="fixed inset-0 bg-black/50 flex justify-center items-center opacity-0 invisible transition-opacity">
    <form
      action="https://formspree.io/f/xjgprpzg"
      method="POST"
      class="flex flex-col gap-4 bg-black p-6 rounded border border-amber-300 md:w-1/5 w-full"
    >
      <h1 id="formTitle" class="text-2xl font-bold text-center text-amber-300"></h1>
      <input
        data-translate-placeholder="namePlaceholder"
        type="text"
        name="name"
        required
        placeholder="Twoje imię"
        class="input input-bordered bg-white text-black w-full"
      >
      <input
        data-translate-placeholder="emailPlaceholder"
        type="email"
        name="email"
        required
        placeholder="Twój e-mail"
        class="input input-bordered bg-white text-black w-full"
      >
      <textarea
        data-translate-placeholder="messagePlaceholder"
        name="message"
        required
        placeholder="Twoja wiadomość"
        class="textarea textarea-bordered bg-white text-black w-full"
        rows="10"
      ></textarea>
      <p id="formDescription" class="text-sm text-gray-400"></p>
      <div class="flex justify-center gap-5">
        <button type="button" id="closeContact" class="btn">Anuluj</button>
        <button type="submit" class="btn btn-primary">Wyślij</button>
      </div>
    </form>
  </div>

  <script src="scripts/scripts.js"></script>
</body>
